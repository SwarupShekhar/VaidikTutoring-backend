version: '3.8'

services:
  # ========================================================
  # Core NestJS Application Service
  # ========================================================
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LC}/${GITHUB_REPOSITORY_NAME_LC}:latest
    container_name: k12-backend-app
    restart: always
    ports:
      - "4004:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================================
  # Secure, Lightweight Redis Instance (for Socket.IO Adapter)
  # ========================================================
  redis:
    image: redis:7-alpine
    container_name: k12-backend-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis-data:
    driver: local
