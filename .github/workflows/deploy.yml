name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ========================================================
  # Job 1: Build & Publish Secure Container Image
  # ========================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires image tags to be lowercase, we extract and sanitize owner/repo
      - name: Inject Lowercase Repository Variables
        id: prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT
          echo "repo_lc=${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ steps.prep.outputs.repo_lc }}:latest
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ steps.prep.outputs.repo_lc }}:${{ github.sha }}
          # Speed optimized caching utilizing Github Actions built-in layer cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================================
  # Job 2: Secure VM Deployment & Health Verification
  # ========================================================
  deploy:
    name: Secure Vultr Deployment
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Codebase (to transfer compose config)
        uses: actions/checkout@v4

      - name: Setup SSH Session Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 139.84.163.249 >> ~/.ssh/known_hosts

      # Lowercase variables to inject correct image schemas inside compose templates
      - name: Prep Compose Image Names
        id: compose_prep
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT
          echo "repo_lc=${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Transfer Docker Compose Config to Vultr
        run: |
          # Create remote sandbox directory structure
          ssh root@139.84.163.249 "mkdir -p /app/k12-backend"
          
          # Replace token template placeholders in local docker-compose.yml
          sed -e "s/\${GITHUB_REPOSITORY_OWNER_LC}/${{ steps.compose_prep.outputs.owner_lc }}/g" -e "s/\${GITHUB_REPOSITORY_NAME_LC}/${{ steps.compose_prep.outputs.repo_lc }}/g" docker-compose.yml > docker-compose.prod.yml
          
          # Upload the sanitized Compose file to Vultr VPS
          scp docker-compose.prod.yml root@139.84.163.249:/app/k12-backend/docker-compose.yml

      - name: Deploy Containers & Run Database Migrations
        run: |
          ssh root@139.84.163.249 "bash -s" << 'EOF'
            cd /app/k12-backend
            
            # Active fail-safe: Verify that .env has been configured on the VPS
            if [ ! -f .env ]; then
              echo "❌ ERROR: /app/k12-backend/.env file is missing on your Vultr server!"
              echo "Please connect to your server, create the folder and file, and paste your variables there."
              exit 1
            fi
            
            chmod 600 .env # Restrict file read access to root for system security
            
            # Authenticate server Docker engine to pull private GHCR image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Pull latest containers
            docker compose pull
            
            # Execute database migrations before live restart to prevent race conditions
            echo "Executing database migrations..."
            docker compose run --rm backend npx prisma migrate deploy
            
            # Restart core and auxiliary containers gracefully
            echo "Re-launching application services..."
            docker compose up -d
            
            # Run post-deployment live health-check check loops
            echo "Initiating health check verification..."
            success=false
            for i in {1..12}; do
              if curl -s -f http://localhost:4004/health > /dev/null; then
                echo "✅ Deployment Healthy! API returned 200 OK on /health"
                success=true
                break
              fi
              echo "Waiting for API to boot... (Attempt $i/12)"
              sleep 5
            done
            
            if [ "$success" = false ]; then
              echo "❌ ERROR: Health check failed! Core server was not reachable after 60 seconds."
              echo "Dumping container runtime logs for analysis:"
              docker compose logs --tail=50 backend
              exit 1
            fi
            
            # Clean up old, unused image states
            docker image prune -f
          EOF
